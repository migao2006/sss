<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#071018">
  <meta name="description" content="台股機會股、多因子趨勢預測、歷史驗證與投資紀錄工具">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
  <title>台股智選</title>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>台股智選</h1>
      <div id="marketDate" class="sub">正在載入盤後資料…</div>
    </div>
    <div class="top-actions">
      <span id="dataMode" class="badge">資料載入中</span>
      <button id="accountBtn" class="account-btn" type="button">登入</button>
    </div>
  </header>

  <main id="app" class="app-shell"></main>

  <nav class="bottom-nav" aria-label="主要功能">
    <button type="button" data-tab="home" class="active"><span>⌂</span>首頁</button>
    <button type="button" data-tab="opportunities"><span>◆</span>機會股</button>
    <button type="button" data-tab="forecast"><span>⌁</span>趨勢預測</button>
    <button type="button" data-tab="verify"><span>✓</span>預測驗證</button>
    <button type="button" data-tab="mine"><span>◎</span>我的</button>
  </nav>

  <div id="modalRoot"></div>
  <script src="/app.js" defer></script>
</body>
</html>
